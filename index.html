<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile</title>
    <!-- আইকনের জন্য FontAwesome যুক্ত করা হলো -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- Loading Page CSS --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a; /* ডার্ক ডিজিটাল ব্যাকগ্রাউন্ড */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .digital-loader {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .digital-loader .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top: 4px solid #48dbfb;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .digital-loader .ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top: 4px solid #ff6b6b;
            animation: spin-reverse 1s linear infinite;
        }

        .digital-loader .ring:nth-child(3) {
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            border-top: 4px solid #1dd1a1;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 5px;
            font-size: 14px;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* পেজ লোড শেষ হলে লোডার লুকানোর ক্লাস */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* --- Main Page CSS (আপনার আগের স্টাইল) --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #ff6b6b, #48dbfb, #1dd1a1, #feca57);
            background-size: 300% 300%;
            animation: gradientMove 6s ease infinite;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientMove { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        .card {
            background: linear-gradient(rgba(17, 20, 30, 0.10), rgba(17, 20, 30, 0.10)), 
                        url('box.png') no-repeat center center;
            background-size: cover;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 40px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .profile-pic-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            padding: 3px; 
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #48dbfb, #1dd1a1, #feca57);
            z-index: 2;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #fff;
        }

        .name { 
            font-size: 26px; 
            font-weight: 800; 
            background: linear-gradient(45deg, #ff6b6b, #48dbfb, #1dd1a1, #feca57);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s ease infinite;
            margin-bottom: 5px; 
            display: inline-block;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
        }

        .bio { font-size: 14px; color: #cbd5e1; margin-bottom: 30px; position: relative; z-index: 2; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 9px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 2;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
        }

        .btn-facebook { background: #1877F2; }
        .btn-whatsapp { background: #25D366; }
        .btn-tiktok { background: #000000; border: 1px solid rgba(255, 255, 255, 0.15); }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    </style>
</head>
<body>

    <!-- লোডিং পেজ বা প্রিলোডার -->
    <div id="loader-wrapper">
        <div class="digital-loader">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>
        <div class="loading-text">Loading Assets...</div>
    </div>

    <!-- মূল কন্টেন্ট -->
    <div class="card">
        <div class="profile-pic-wrapper">
            <img class="profile-pic" src="image.png" alt="Profile Picture" />
        </div>
        <div class="name">SHOPPING AREA</div>
        <div class="bio">📍 Lakshmipur, Bangladesh</div>
        
        <a class="btn btn-facebook" href="https://www.facebook.com/share/1C1ToZT8Yw/" target="_blank">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        <a class="btn btn-whatsapp" href="https://wa.me/8801347062830" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
        <a class="btn btn-tiktok" href="https://vm.tiktok.com/ZS96oFVxBNkn8-JTqgd/" target="_blank">
            <i class="fab fa-tiktok"></i> Tik Tok
        </a>
        <a class="btn btn-instagram" href="https://www.instagram.com/shoppingarea22?igsh=MWEyZWg2ODRoOHVreg==" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>
    </div>

    <!-- লোডার কন্ট্রোল করার জন্য জাভাস্ক্রিপ্ট -->
    <script>
        window.addEventListener("load", function () {
            const loader = document.getElementById("loader-wrapper");
            // পেজ লোড হওয়ার ১ সেকেন্ড পর লোডারটি সরিয়ে ফেলা হবে একটি স্মুথ ট্রানজিশনের মাধ্যমে
            setTimeout(() => {
                loader.classList.add("loader-hidden");
            }, 1000); 
        });
    </script>
</body>
</html>
